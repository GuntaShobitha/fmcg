<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forgot Password — Stackly</title>
<link rel="icon" href="/favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-visual"><div class="quote"><h2>We'll help you get back in.</h2></div></div>
  <div class="auth-body">
    <div class="auth-top">
      <a href="/index.html"><img src="/images/logo-dark.webp" alt="STACKLY"/></a>
      <a href="/login.html" class="btn btn-ghost" style="padding:8px 16px;font-size:.85rem">← Back to Login</a>
    </div>
    <form class="auth-form demo-form" onsubmit="event.preventDefault(); alert('Reset link sent to your email.'); location.href='/login.html';">
      <h2>Reset password</h2>
      <p class="sub">Enter your email — we'll send you a reset link.</p>
      <div class="field"><label>Email</label><input type="email" required placeholder="you@fresh.com"/></div>
      <button type="submit" class="btn btn-primary">Send reset link</button>
      <p class="auth-alt">Remember it? <a href="/login.html">Sign in</a></p>
    </form>
  </div>
</div>
<div id="stackly-loader"><img src="/images/stackly-logo-green.webp" alt="Loading"/></div>
<script src="/js/include.js"></script>
</body>
</html>
