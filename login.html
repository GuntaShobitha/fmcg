<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Stackly</title>
<link rel="icon" href="/favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-visual">
    <div class="quote">
      <span class="eyebrow" style="color:#e8a53a">Stackly</span>
      <h2>Farm-fresh, delivered to your door.</h2>
      <p style="color:rgba(255,255,255,.85);margin-top:10px">Sign in to manage your weekly box, track deliveries and rate what you loved.</p>
    </div>
  </div>
  <div class="auth-body">
    <div class="auth-top">
      <a href="/index.html"><img src="images/stackly-logo-green.webp" alt="STACKLY" style="height:80px; width:120px;"/></a>
      <a href="/index.html" class="btn btn-ghost" style="padding:8px 16px;font-size:.85rem">← Back to Home</a>
    </div>
    <form class="auth-form" onsubmit="return handleLogin(event)">
      <h2>Welcome back </h2>
      <p class="sub">Sign in to your Stackly account</p>
      <div class="field">
        <label>Role</label>
        <select id="role" required>
          <option value="">-- Select role --</option>
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@fresh.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••"/>
      </div>
      <div class="form-row">
        <label style="display:inline-flex;gap:6px;align-items:center"><input type="checkbox"/> Remember me</label>
        <a href="404.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
      <p class="auth-alt">New to Stackly? <a href="register.html">Create an account</a></p>
    </form>
  </div>
</div>
<script src="js/auth.js"></script>
<div id="stackly-loader"><img src="images/stackly-logo-green.webp" alt="Loading"/></div>
<script src="js/include.js"></script>
</body>
</html>
